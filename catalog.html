<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קטלוג מוצרים GMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 3em;
            color: #1e3a8a;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1.1em;
            color: #6b7280;
            font-weight: 500;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15), 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: linear-gradient(135deg, #e5e7eb 0%, #f3f4f6 100%);
        }

        .product-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-code {
            font-size: 0.85em;
            color: #0ea5e9;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 1.3em;
            color: #1f2937;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
            min-height: 2.8em;
        }

        .product-description {
            font-size: 0.95em;
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.6;
            min-height: 2.4em;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
            gap: 12px;
        }

        .product-price {
            font-size: 1.8em;
            color: #1e3a8a;
            font-weight: 800;
            white-space: nowrap;
        }

        .product-price .currency {
            font-size: 0.8em;
            margin-left: 4px;
        }

        .btn-request {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Heebo', sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-request:hover {
            background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
            transform: translateX(-2px);
            box-shadow: 0 8px 16px rgba(30, 58, 138, 0.3);
        }

        .btn-request:active {
            transform: translateX(0);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .product-card {
            animation: fadeIn 0.5s ease-out;
        }

        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.2s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(n+6) { animation-delay: 0.3s; }

        .product-category {
            display: inline-block;
            font-size: 0.75em;
            background: #e0e7ff;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .empty-image {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e5e7eb 0%, #f3f4f6 100%);
            color: #9ca3af;
            font-size: 14px;
            font-family: 'Heebo', sans-serif;
        }
    </style>
</head>

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const baseUrl = 'https://raw.githubusercontent.com/dafi-k/GMA-CATLOG-2026/main/GMA/PIC/';
            grid.innerHTML = products.map((product, index) => {
                const imagePath = baseUrl + product.code + '.avif';
                return `
                    <div class="product-card">
                        <img src="${imagePath}" alt="${product.name}" class="product-image" 
                             onerror="this.classList.add('empty-image'); this.innerHTML='לא זמין'; this.style.backgroundImage='none';">
                        <div class="product-content">
                            <div>
                                <div class="product-code">${product.code}</div>
                                <div class="product-category">${product.category}</div>
                                <h2 class="product-name">${product.name}</h2>

                            </div>
                            <div class="product-footer">

                                </div>
                                <button class="btn-request" onclick="requestProduct('${product.code}', '${product.name}')">שלח בקשה</button>

                        </div>

            }).join('');
